<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Future Self &mdash; Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="fs-container">
    <div class="fs-header">
      <h1 class="fs-title">Future Self</h1>
      <p class="fs-tagline">Configure your sleep protection.</p>
    </div>

    <!-- Sleep Schedule -->
    <section class="fs-card">
      <h2 class="fs-card-title">Sleep Schedule</h2>

      <div class="fs-field">
        <label class="fs-label" for="wake-time">Wake-up time</label>
        <input type="time" class="fs-input" id="wake-time" value="06:00">
      </div>

      <div class="fs-field">
        <label class="fs-label" for="sleep-hours">Hours of sleep</label>
        <div class="fs-slider-row">
          <input type="range" id="sleep-hours" min="6" max="9" step="0.5" value="7.5" class="fs-range">
          <span class="fs-slider-value" id="sleep-hours-value">7.5 hrs</span>
        </div>
      </div>

      <div class="fs-field">
        <label class="fs-label" for="buffer">Wind-down buffer</label>
        <select class="fs-select" id="buffer">
          <option value="0">0 min</option>
          <option value="15">15 min</option>
          <option value="30" selected>30 min</option>
          <option value="45">45 min</option>
          <option value="60">60 min</option>
        </select>
      </div>

      <div class="fs-calculation" id="calculation">
        <span class="fs-calc-label">Screens off at</span>
        <span class="fs-calc-time" id="block-time">10:00 PM</span>
      </div>
    </section>

    <!-- Blocklist -->
    <section class="fs-card">
      <h2 class="fs-card-title">Blocked Sites</h2>
      <p class="fs-card-desc">Choose which sites to block during your sleep window.</p>

      <div id="blocklist-categories"></div>

      <!-- Custom Categories -->
      <div class="fs-custom-categories">
        <div class="fs-custom-categories-header">
          <h3 class="fs-custom-title">Custom Categories</h3>
          <button class="fs-button-secondary fs-btn-small" id="btn-new-category">+ New Category</button>
        </div>

        <!-- Inline form for creating/renaming a category (hidden by default) -->
        <div class="fs-category-form fs-hidden" id="category-form">
          <input type="text" class="fs-custom-input" id="category-name-input" placeholder="e.g. Gaming, News, Design Tools" maxlength="40">
          <div class="fs-category-form-actions">
            <button class="fs-button-secondary fs-btn-small" id="btn-save-category">Save</button>
            <button class="fs-category-toggle" id="btn-cancel-category">Cancel</button>
          </div>
        </div>

        <!-- Custom categories rendered here (same style as defaults) -->
        <div id="custom-categories-container"></div>
      </div>

      <!-- Add domain to any category -->
      <div class="fs-custom-domains">
        <h3 class="fs-custom-title">Add Custom Domain</h3>
        <div class="fs-custom-input-row">
          <input type="text" class="fs-custom-input" id="custom-domain" placeholder="e.g. example.com">
          <select class="fs-select fs-category-select" id="custom-domain-category">
            <option value="">Category...</option>
          </select>
          <button class="fs-button-secondary fs-btn-small" id="btn-add-domain">Add</button>
        </div>
      </div>
    </section>

    <!-- Save -->
    <button class="fs-button-primary fs-btn-save" id="btn-save">Protect my sleep</button>
    <p class="fs-save-msg fs-hidden" id="save-msg"></p>

    <!-- Hidden activation -->
    <div class="fs-activation">
      <input type="text" class="fs-activation-input" id="activation-code" placeholder="Activation code" autocomplete="off">
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
