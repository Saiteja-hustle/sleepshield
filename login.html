<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Future Self — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --night-black: #0B0E14;
      --night-charcoal: #151923;
      --night-graphite: #1E2433;
      --night-slate: #2A3040;
      --text-primary: #E8ECF4;
      --text-secondary: #8B95A8;
      --text-muted: #525E73;
      --accent-green: #4ADE80;
      --accent-green-glow: rgba(74, 222, 128, 0.15);
      --accent-amber: #FBBF24;
      --accent-blue: #60A5FA;
      --accent-red-soft: #F87171;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--night-black);
      color: var(--text-primary);
      font-family: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .fs-login {
      max-width: 420px;
      width: 100%;
    }

    .fs-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .fs-title {
      font-size: 32px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.03em;
      line-height: 1.1;
    }

    .fs-tagline {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 0.5rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* Tabs */
    .fs-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 2rem;
      background: var(--night-charcoal);
      border-radius: 12px;
      padding: 4px;
    }

    .fs-tab {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 0.7rem 1rem;
      cursor: pointer;
      border-radius: 10px;
      transition: background 0.2s, color 0.2s;
    }

    .fs-tab.fs-active {
      background: var(--night-graphite);
      color: var(--text-primary);
    }

    .fs-tab:hover:not(.fs-active) {
      color: var(--text-secondary);
    }

    /* Form */
    .fs-form {
      display: none;
    }

    .fs-form.fs-active {
      display: block;
    }

    .fs-field {
      margin-bottom: 1.25rem;
    }

    .fs-label {
      display: block;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 0.4rem;
      font-weight: 500;
    }

    .fs-input {
      background: var(--night-graphite);
      color: var(--text-primary);
      border: 1px solid var(--night-slate);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 15px;
      font-family: inherit;
      width: 100%;
      transition: border-color 0.2s;
    }

    .fs-input:focus {
      outline: none;
      border-color: var(--accent-green);
    }

    .fs-btn-primary {
      display: block;
      width: 100%;
      background: var(--accent-green);
      color: var(--night-black);
      border: none;
      border-radius: 12px;
      padding: 0.9rem 2rem;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      text-align: center;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 0.5rem;
    }

    .fs-btn-primary:hover { opacity: 0.9; }
    .fs-btn-primary:active { transform: scale(0.98); }
    .fs-btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .fs-btn-login {
      background: var(--accent-blue);
    }

    .fs-small-text {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 0.75rem;
    }

    .fs-error {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: 10px;
      padding: 0.6rem 1rem;
      font-size: 13px;
      color: var(--accent-red-soft);
      margin-bottom: 1rem;
      display: none;
      line-height: 1.4;
    }

    .fs-error.fs-visible {
      display: block;
    }

    .fs-success {
      background: var(--accent-green-glow);
      border: 1px solid rgba(74, 222, 128, 0.3);
      border-radius: 10px;
      padding: 0.6rem 1rem;
      font-size: 13px;
      color: var(--accent-green);
      margin-bottom: 1rem;
      display: none;
      line-height: 1.4;
    }

    .fs-success.fs-visible {
      display: block;
    }

    .fs-footer {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .fs-forgot-link {
      display: block;
      text-align: center;
      margin-top: 0.75rem;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      transition: color 0.2s;
    }

    .fs-forgot-link:hover {
      color: var(--accent-blue);
    }

    .fs-forgot-section {
      display: none;
      margin-top: 1.25rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--night-slate);
    }

    .fs-forgot-section.fs-visible {
      display: block;
    }

    .fs-forgot-row {
      display: flex;
      gap: 0.5rem;
    }

    .fs-forgot-row .fs-input {
      flex: 1;
    }

    .fs-btn-reset {
      background: var(--accent-blue);
      color: var(--night-black);
      border: none;
      border-radius: 10px;
      padding: 0.75rem 1.25rem;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
    }

    .fs-btn-reset:hover { opacity: 0.9; }
    .fs-btn-reset:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .fs-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.25rem 0;
      color: var(--text-muted);
      font-size: 13px;
    }

    .fs-divider::before,
    .fs-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--night-slate);
    }

    .fs-btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
      background: var(--night-graphite);
      color: var(--text-primary);
      border: 1px solid var(--night-slate);
      border-radius: 12px;
      padding: 0.9rem 2rem;
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .fs-btn-google:hover {
      border-color: var(--text-muted);
      background: var(--night-slate);
    }

    .fs-btn-google:active {
      transform: scale(0.98);
    }

    .fs-btn-google svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="fs-login">
    <div class="fs-header">
      <h1 class="fs-title">Future Self</h1>
      <p class="fs-tagline">Your PC doesn't have a bedtime. Now it does.</p>
    </div>

    <div class="fs-tabs">
      <button class="fs-tab fs-active" id="tab-signup">Start Free Trial</button>
      <button class="fs-tab" id="tab-login">Log In</button>
    </div>

    <!-- Sign Up Form -->
    <div class="fs-form fs-active" id="form-signup">
      <div class="fs-error" id="signup-error"></div>
      <div class="fs-success" id="signup-success"></div>
      <div class="fs-field">
        <label class="fs-label" for="signup-email">Email</label>
        <input type="email" class="fs-input" id="signup-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="fs-field">
        <label class="fs-label" for="signup-password">Password</label>
        <input type="password" class="fs-input" id="signup-password" placeholder="Min 6 characters" autocomplete="new-password">
      </div>
      <button class="fs-btn-primary" id="btn-signup">Start Free Trial — 24 Hours Free</button>
      <p class="fs-small-text">No credit card required</p>
      <div class="fs-divider">or</div>
      <button class="fs-btn-google" id="btn-google-signup">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A11.96 11.96 0 0 0 1 12c0 1.94.46 3.77 1.18 5.07l3.66-2.98z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Sign in with Google
      </button>
    </div>

    <!-- Log In Form -->
    <div class="fs-form" id="form-login">
      <div class="fs-error" id="login-error"></div>
      <div class="fs-field">
        <label class="fs-label" for="login-email">Email</label>
        <input type="email" class="fs-input" id="login-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="fs-field">
        <label class="fs-label" for="login-password">Password</label>
        <input type="password" class="fs-input" id="login-password" placeholder="Your password" autocomplete="current-password">
      </div>
      <button class="fs-btn-primary fs-btn-login" id="btn-login">Log In</button>
      <div class="fs-divider">or</div>
      <button class="fs-btn-google" id="btn-google-login">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A11.96 11.96 0 0 0 1 12c0 1.94.46 3.77 1.18 5.07l3.66-2.98z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Sign in with Google
      </button>
      <button type="button" class="fs-forgot-link" id="forgot-toggle">Forgot Password?</button>
      <div class="fs-forgot-section" id="forgot-section">
        <div class="fs-error" id="forgot-error"></div>
        <div class="fs-success" id="forgot-success"></div>
        <div class="fs-forgot-row">
          <input type="email" class="fs-input" id="forgot-email" placeholder="you@example.com" autocomplete="email">
          <button type="button" class="fs-btn-reset" id="btn-forgot">Send Reset Link</button>
        </div>
      </div>
    </div>

    <p class="fs-footer">Tomorrow will thank you.</p>
  </div>

  <script src="supabase-client.js"></script>
  <script src="login.js"></script>
</body>
</html>
